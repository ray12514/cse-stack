description: Reduced HDF5+MPI package set for pipeline smoke tests.
openssl:
  min_version: "3.0.0"
  recommended_package_set: "hdf5-mpi-smoke-legacy-openssl"
  reason: "The reduced MPI smoke path still uses the default PMIx-based stacks."
variants:
  v1-openmpi:
    mpi_provider: openmpi
    specs:
      - "openmpi@5.0.5 fabrics=auto schedulers=slurm"
      - "cmake@3.29.6"
      - "zlib@1.3.1"
      - "hdf5@1.14.4 +mpi  +fortran +cxx +hl +threadsafe"
    views:
      mpi:
        - "+mpi"
        - "openmpi"
        - "cmake"
        - "zlib"
  v2-mpich:
    mpi_provider: mpich
    specs:
      - "mpich@{mpich_version} device=ch4 netmod=ofi pmi=pmix"
      - "cmake@3.29.6"
      - "zlib@1.3.1"
      - "hdf5@1.14.4 +mpi  +fortran +cxx +hl +threadsafe ^mpich"
    views:
      mpi:
        - "+mpi"
        - "mpich"
        - "cmake"
        - "zlib"
