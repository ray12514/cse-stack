description: Reduced HDF5+MPI package set for pipeline smoke tests.
openssl:
  min_version: "3.0.0"
  recommended_package_set: "hdf5-mpi-smoke-legacy-openssl"
  reason: "The reduced MPI smoke path still uses the default PMIx-based stacks."
variants:
  v1-openmpi:
    mpi_provider: openmpi
    specs:
      - "openmpi@5.0.5 fabrics=auto"
      - "hdf5@1.14.4 +mpi  +fortran +cxx +hl"
    views:
      mpi:
        - "+mpi"
        - "openmpi"
  v2-mpich:
    mpi_provider: mpich
    specs:
      - "mpich@{mpich_version} device=ch4 netmod=ofi pmi=pmix ~hydra +slurm"
      - "hdf5@1.14.4 +mpi  +fortran +cxx +hl ^mpich@{mpich_version}"
    views:
      mpi:
        - "+mpi"
        - "mpich"
