description: Expanded two-version scientific CSE package set.
openssl:
  min_version: "3.0.0"
  recommended_package_set: "science-full-legacy-openssl"
  reason: "The expanded science stack follows the default modern MPI/PMIx policy."
variants:
  v1-openmpi:
    mpi_provider: openmpi
    specs:
      - "openmpi@5.0.8 fabrics=auto"
      - "hdf5@1.14.6 +mpi  +fortran +cxx +hl"
      - "hdf5@1.14.6 ~mpi  +fortran +cxx +hl"
      - "hdf5@1.14.5 +mpi  +fortran +cxx +hl"
      - "hdf5@1.14.5 ~mpi  +fortran +cxx +hl"
      - "netcdf-c@4.9.3 +mpi  +parallel-netcdf  ^hdf5@1.14.6+mpi"
      - "netcdf-c@4.9.3 ~mpi                    ^hdf5@1.14.6~mpi"
      - "netcdf-c@4.9.2 +mpi  +parallel-netcdf  ^hdf5@1.14.5+mpi"
      - "netcdf-c@4.9.2 ~mpi                    ^hdf5@1.14.5~mpi"
      - "netcdf-fortran@4.6.2                   ^netcdf-c@4.9.3+mpi"
      - "netcdf-fortran@4.6.2                   ^netcdf-c@4.9.3~mpi"
      - "netcdf-fortran@4.6.1                   ^netcdf-c@4.9.2+mpi"
      - "netcdf-fortran@4.6.1                   ^netcdf-c@4.9.2~mpi"
      - "netcdf-cxx4@4.3.1                      ^netcdf-c@4.9.3+mpi"
      - "netcdf-cxx4@4.3.1                      ^netcdf-c@4.9.3~mpi"
      - matrix:
        - ["fftw@3.3.10", "fftw@3.3.9"]
        - ["+mpi ^openmpi", "~mpi"]
      - "openblas@0.3.30"
      - "openblas@0.3.29"
      - "gnuplot@6.0.0"
      - "gnuplot@5.4.10"
      - "gsl@2.8"
      - "gsl@2.7.1"
      - "cmake@4.1.2"
      - "cmake@4.1.1"
      - "boost@1.88.0 ~mpi"
      - "boost@1.87.0 ~mpi"
      - "python@3.14.0"
      - "python@3.13.8"
      - "py-numpy@2.3.4 ^python@3.14.0"
      - "py-numpy@2.3.3 ^python@3.13.8"
      - "miniforge3@25.3.0-3"
    views:
      mpi:
        - "+mpi"
        - "openmpi"
      serial:
        - "hdf5~mpi"
        - "netcdf-c~mpi"
        - "netcdf-fortran ^netcdf-c~mpi"
        - "netcdf-cxx4 ^netcdf-c~mpi"
        - "fftw~mpi"
        - "openblas"
        - "gnuplot"
        - "gsl"
        - "cmake"
        - "boost~mpi"
        - "python"
        - "py-numpy"
        - "miniforge3"
  v2-mpich:
    mpi_provider: mpich
    specs:
      - "mpich@4.3.2 device=ch4 netmod=ofi pmi=pmix ~hydra +slurm"
      - "hdf5@1.14.6 +mpi  +fortran +cxx +hl ^mpich"
      - "hdf5@1.14.6 ~mpi  +fortran +cxx +hl"
      - "hdf5@1.14.5 +mpi  +fortran +cxx +hl ^mpich"
      - "hdf5@1.14.5 ~mpi  +fortran +cxx +hl"
      - "netcdf-c@4.9.3 +mpi  +parallel-netcdf  ^hdf5@1.14.6+mpi  ^mpich"
      - "netcdf-c@4.9.3 ~mpi                    ^hdf5@1.14.6~mpi"
      - "netcdf-c@4.9.2 +mpi  +parallel-netcdf  ^hdf5@1.14.5+mpi  ^mpich"
      - "netcdf-c@4.9.2 ~mpi                    ^hdf5@1.14.5~mpi"
      - "netcdf-fortran@4.6.2                   ^netcdf-c@4.9.3+mpi"
      - "netcdf-fortran@4.6.2                   ^netcdf-c@4.9.3~mpi"
      - "netcdf-fortran@4.6.1                   ^netcdf-c@4.9.2+mpi"
      - "netcdf-fortran@4.6.1                   ^netcdf-c@4.9.2~mpi"
      - "netcdf-cxx4@4.3.1                      ^netcdf-c@4.9.3+mpi"
      - "netcdf-cxx4@4.3.1                      ^netcdf-c@4.9.3~mpi"
      - matrix:
        - ["fftw@3.3.10", "fftw@3.3.9"]
        - ["+mpi ^mpich", "~mpi"]
      - "openblas@0.3.30"
      - "openblas@0.3.29"
      - "gnuplot@6.0.0"
      - "gnuplot@5.4.10"
      - "gsl@2.8"
      - "gsl@2.7.1"
      - "cmake@4.1.2"
      - "cmake@4.1.1"
      - "boost@1.88.0 ~mpi"
      - "boost@1.87.0 ~mpi"
      - "python@3.14.0"
      - "python@3.13.8"
      - "py-numpy@2.3.4 ^python@3.14.0"
      - "py-numpy@2.3.3 ^python@3.13.8"
      - "miniforge3@25.3.0-3"
    views:
      mpi:
        - "+mpi"
        - "mpich"
      serial:
        - "hdf5~mpi"
        - "netcdf-c~mpi"
        - "netcdf-fortran ^netcdf-c~mpi"
        - "netcdf-cxx4 ^netcdf-c~mpi"
        - "fftw~mpi"
        - "openblas"
        - "gnuplot"
        - "gsl"
        - "cmake"
        - "boost~mpi"
        - "python"
        - "py-numpy"
        - "miniforge3"
