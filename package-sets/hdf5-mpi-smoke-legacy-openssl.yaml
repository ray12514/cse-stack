description: Reduced HDF5+MPI package set for sites with external OpenSSL older than 3.x.
openssl:
  min_version: "1.1.1"
variants:
  v1-openmpi:
    mpi_provider: openmpi
    specs:
      - "openmpi@4.1.6 fabrics=auto"
      - "hdf5@1.14.4 +mpi  +fortran +cxx +hl +threadsafe"
    views:
      mpi:
        - "+mpi"
        - "openmpi"
  v2-mpich:
    mpi_provider: mpich
    specs:
      - "mpich@{mpich_version} device=ch4 netmod=ofi pmi=pmix"
      - "hdf5@1.14.4 +mpi  +fortran +cxx +hl +threadsafe ^mpich"
    views:
      mpi:
        - "+mpi"
        - "mpich"
