# Mock Cluster Inspector system profile for a Cray system.
# Used to test v2-cray-integrated --dry-run on a non-Cray host:
#
#   ./scripts/deploy.sh \
#       --variant v2-cray-integrated \
#       --release test \
#       --shared-path /tmp/cse-test \
#       --mock-profile profiles/mock-cray.yaml \
#       --dry-run
#
# TODO: replace placeholder versions with values from the actual target Cray system.

schema_version: 1

system:
  name: login01
  site: example-hpc
  platform_class: cray
  node_role: login
  environment_model: cray-pe
  observed_platform_signals:
    - cray_pe_modules
    - prgenv_loaded
  classification_confidence: high

os:
  name: SLES
  version: "15.4"
  kernel: 5.14.21-150400.24.81-default
  glibc_version: "2.34"

modules:
  system: lmod
  modulepath: /opt/cray/pe/lmod/modulefiles/core
  loaded:
    - name: PrgEnv-gnu
      version: "8.3.3"
    - name: gcc
      version: "12.3.0"           # TODO: confirm
      prefix: /opt/cray/pe/gcc/12.3.0/snos
    - name: cray-mpich
      version: "8.1.30"           # TODO: confirm from `module list`
      prefix: /opt/cray/pe/mpich/8.1.30/ofi/gnu/12.3
    - name: cray-libsci
      version: "23.12.5"          # TODO: confirm from `module list`
      prefix: /opt/cray/pe/libsci/23.12.5/gnu/12.3
    - name: cray-pals
      version: "1.4.0"            # TODO: confirm; remove if Slurm (not PBS) Cray
      prefix: /opt/cray/pe/pals/1.4.0
  active_context:
    source: active_shell
    context_name: prgenv-gnu
    prgenv_module: "PrgEnv-gnu"
    mpi_module: "cray-mpich/8.1.30"
    compiler_wrapper_family: cray

scheduler:
  type: pbs    # TODO: change to "slurm" if the target Cray uses Slurm

hardware:
  cpu:
    microarch: zen3    # TODO: confirm against actual compute node CPU
    model: AMD EPYC 7763
    sockets: 2
    cores_per_socket: 64
  gpus:
    vendor: unknown
    count_per_node: 0
  nics: []
  network:
    fabric: slingshot
    communication_provider: libfabric

vendor_substrate:
  prgenv_module: "PrgEnv-gnu"
  mpi_module: "cray-mpich/8.1.30"
  mpi_family: mpich
  source: cray

externals_policy:
  forbid_build:
    - cray-mpich
    - cray-libsci
    - cray-pals
    - gcc
  module_based_externals: true

capabilities:
  t0: {state: ready}
  t1: {state: ready}
  t2: {state: unknown}
  t3: {state: unknown}
