# Mock Cluster Inspector system profile for a Cray system (v2-mpich target).
# Used to test v2-mpich --dry-run on a non-Cray host:
#
#   ./scripts/deploy.sh \
#       --variant v2-mpich \
#       --release test \
#       --shared-path /tmp/cse-test \
#       --mock-profile profiles/mock-cray.yaml \
#       --dry-run
#
# This profile exercises:
#   - libfabric external (Slingshot OFI transport for MPICH)
#   - cray-pals external (PBS job launcher / PMIx on Cray)
#   - is_cray() = True (triggers cray_cpu_arch for Spack target)
#   - MPICH version auto-detection: cray-mpich 8.x → mpich@3.4.3

schema_version: 1

system:
  name: login01
  site: example-hpc
  platform_class: cray
  node_role: login
  environment_model: cray-pe
  observed_platform_signals:
    - cray_pe_modules
  classification_confidence: high

os:
  name: SLES
  version: "15.4"
  kernel: 5.14.21-150400.24.81-default
  glibc_version: "2.34"

modules:
  system: lmod
  modulepath: /opt/cray/pe/lmod/modulefiles/core
  loaded:
    - name: libfabric
      version: "1.15.2"
      prefix: /opt/cray/pe/libfabric/1.15.2
    - name: cray-mpich
      version: "8.1.30"
      prefix: /opt/cray/pe/mpich/8.1.30/ofi/gnu/12.3
    - name: cray-pals
      version: "1.4.0"
      prefix: /opt/cray/pe/pals/1.4.0

scheduler:
  type: pbs

hardware:
  cpu:
    microarch: zen3
    model: AMD EPYC 7763
    sockets: 2
    cores_per_socket: 64
  gpus:
    vendor: unknown
    count_per_node: 0
  nics: []
  network:
    fabric: slingshot
    communication_provider: libfabric

vendor_substrate:
  mpi_module: "cray-mpich/8.1.30"
  mpi_family: mpich
  source: cray

externals_policy:
  forbid_build:
    - cray-pals
  module_based_externals: true

capabilities:
  t0: {state: ready}
  t1: {state: ready}
  t2: {state: unknown}
  t3: {state: unknown}
