modules:
  prefix_inspections:
    bin:
      - PATH
    lib:
      - LD_LIBRARY_PATH
    lib64:
      - LD_LIBRARY_PATH
    include:
      - CPATH
    lib/pkgconfig:
      - PKG_CONFIG_PATH
    lib64/pkgconfig:
      - PKG_CONFIG_PATH
    share/man:
      - MANPATH

  default:
    enable:
      - lmod
    use_view: false
    roots:
      lmod: $SHARED_PATH/cse/$CSE_RELEASE/v1-minimal/modules
    lmod:
      hierarchy: []
      hash_length: 0
      hide_implicits: true
      exclude_implicits: true
      projections:
        all: 'cse/{name}'
      all:
        autoload: direct
        environment:
          set:
            '{name}_ROOT': '{prefix}'
            '{name}_DIR':  '{prefix}'
            '{name}_HOME': '{prefix}'
      hdf5:
        suffixes:
          '+mpi': 'mpi'
          '~mpi': 'serial'
        environment:
          set:
            HDF5_ROOT: '{prefix}'
            HDF5_DIR:  '{prefix}'
            HDF5_HOME: '{prefix}'
      netcdf-c:
        suffixes:
          '+mpi': 'mpi'
          '~mpi': 'serial'
        environment:
          set:
            NETCDF_ROOT:   '{prefix}'
            NETCDF_DIR:    '{prefix}'
            NETCDF_HOME:   '{prefix}'
            NETCDF_C_ROOT: '{prefix}'
      netcdf-fortran:
        suffixes:
          '^netcdf-c +mpi': 'mpi'
          '^netcdf-c ~mpi': 'serial'
        environment:
          set:
            NETCDF_FORTRAN_ROOT: '{prefix}'
            NETCDF_FORTRAN_DIR:  '{prefix}'
      netcdf-cxx4:
        suffixes:
          '^netcdf-c +mpi': 'mpi'
          '^netcdf-c ~mpi': 'serial'
        environment:
          set:
            NETCDF_CXX_ROOT: '{prefix}'
      openmpi:
        environment:
          set:
            MPI_HOME: '{prefix}'
            MPI_ROOT: '{prefix}'
            MPI_DIR:  '{prefix}'
            OMPI_DIR: '{prefix}'
