spack:
  include:
    - ./packages.yaml
    - ./config.yaml
    - ./modules.yaml
    # Written by scripts/stage2_spack.sh after GCC is bootstrapped; the
    # rendered template (templates/spack.yaml.j2) only emits these entries
    # when the files already exist at deploy time.
    - ../gcc-compilers.yaml
    - ../gcc-bootstrap.yaml

  view:
    cse_modules:
      root: $SHARED_PATH/cse/$CSE_RELEASE/v1-minimal/views/modules
      projections:
        all: "{name}/{version}"
        "+mpi": "{name}/{version}-mpi"
        "~mpi": "{name}/{version}-serial"
        "^netcdf-c +mpi": "{name}/{version}-mpi"
        "^netcdf-c ~mpi": "{name}/{version}-serial"
      link: all
      link_type: symlink
    mpi:
      root: $SHARED_PATH/cse/$CSE_RELEASE/v1-minimal/views/mpi
      select:
        - "+mpi"
        - openmpi
      link: all
      link_type: symlink
    serial:
      root: $SHARED_PATH/cse/$CSE_RELEASE/v1-minimal/views/serial
      select:
        - "hdf5~mpi"
        - "netcdf-c~mpi"
        - "netcdf-fortran ^netcdf-c~mpi"
        - "netcdf-cxx4 ^netcdf-c~mpi"
      link: all
      link_type: symlink

  concretizer:
    unify: when_possible
    reuse:  true

  specs:
    - openmpi@5.0.5 +legacylaunchers fabrics=auto
    - hdf5@1.14.4 +mpi  +fortran +cxx +hl +threadsafe
    - hdf5@1.14.4 ~mpi  +fortran +cxx +hl +threadsafe
    - netcdf-c@4.9.2 +mpi  +parallel-netcdf  ^hdf5@1.14.4+mpi
    - netcdf-c@4.9.2 ~mpi                    ^hdf5@1.14.4~mpi
    - netcdf-fortran@4.6.1                   ^netcdf-c@4.9.2+mpi
    - netcdf-fortran@4.6.1                   ^netcdf-c@4.9.2~mpi
    - netcdf-cxx4@4.3.1                      ^netcdf-c@4.9.2+mpi
    - netcdf-cxx4@4.3.1                      ^netcdf-c@4.9.2~mpi
