spack:
  include:
    - ./packages.yaml
    - ./config.yaml
    - ./modules.yaml

  view:
    mpi:
      root: $SHARED_PATH/cse/$CSE_RELEASE/v2-cray-integrated/views/mpi
      select:
        - "+mpi"
        - cray-mpich
        - cmake
        - zlib
      link: all
      link_type: symlink
    serial:
      root: $SHARED_PATH/cse/$CSE_RELEASE/v2-cray-integrated/views/serial
      select:
        - "hdf5~mpi"
        - "netcdf-c~mpi"
        - "netcdf-fortran ^netcdf-c~mpi"
        - "netcdf-cxx4 ^netcdf-c~mpi"
        - cmake
        - zlib
      link: all
      link_type: symlink

  concretizer:
    unify: when_possible
    reuse:  true

  specs:
    - cmake@3.29.6
    - zlib@1.3.1
    - hdf5@1.14.4 +mpi  +fortran +cxx +hl +threadsafe ^cray-mpich
    - hdf5@1.14.4 ~mpi  +fortran +cxx +hl +threadsafe
    - netcdf-c@4.9.2 +mpi  +parallel-netcdf  ^hdf5@1.14.4+mpi  ^cray-mpich
    - netcdf-c@4.9.2 ~mpi                    ^hdf5@1.14.4~mpi
    - netcdf-fortran@4.6.1                   ^netcdf-c@4.9.2+mpi
    - netcdf-fortran@4.6.1                   ^netcdf-c@4.9.2~mpi
    - netcdf-cxx4@4.3.1                      ^netcdf-c@4.9.2+mpi
    - netcdf-cxx4@4.3.1                      ^netcdf-c@4.9.2~mpi
