packages:
  all:
    target: [zen3]    # filled at deploy time from Stage 1 (Cluster Inspector)
    providers:
      mpi:       [cray-mpich]
      blas:      [cray-libsci]
      lapack:    [cray-libsci]
      scalapack: [cray-libsci]
    require:
      - "%gcc@12.3.0"    # filled at deploy time from PrgEnv-gnu via Stage 1
    permissions:
      read:  world
      write: group
      group: cse

  # OS-level externals (same as Variant A)
  openssl:
    buildable: false
    externals:
      - spec: openssl@3.0.7
        prefix: /usr
  curl:
    buildable: true
    externals:
      - spec: curl@7.85.0
        prefix: /usr
  glibc:
    buildable: false
    externals:
      - spec: glibc@2.34
        prefix: /usr
  perl:
    buildable: true
    externals:
      - spec: perl@5.32.1
        prefix: /usr
  python:
    externals:
      - spec: python@3.11.5
        prefix: /usr

  # Cray substrate — versions read from Stage 1 (Cluster Inspector) at deploy time.
  gcc:
    buildable: false
    externals:
      - spec: gcc@12.3.0 languages='c,c++,fortran'
        prefix: /opt/cray/pe/gcc/12.3.0/snos
        modules:
          - PrgEnv-gnu
          - gcc/12.3.0
        extra_attributes:
          compilers:
            c:       /opt/cray/pe/gcc/12.3.0/snos/bin/gcc
            cxx:     /opt/cray/pe/gcc/12.3.0/snos/bin/g++
            fortran: /opt/cray/pe/gcc/12.3.0/snos/bin/gfortran

  cray-mpich:
    buildable: false
    externals:
      - spec: cray-mpich@8.1.30 %gcc@12.3.0
        modules: [cray-mpich/8.1.30]
        prefix: /opt/cray/pe/mpich/8.1.30/ofi/gnu/12.3

  cray-libsci:
    buildable: false
    externals:
      - spec: cray-libsci@23.12.5
        modules: [cray-libsci/23.12.5]
        prefix: /opt/cray/pe/libsci/23.12.5/gnu/12.3

  # cray-pals provides mpiexec on PBS-based Cray systems.
  # On Slurm Cray systems srun is used; remove this block in that case.
  # Stage 1 (Cluster Inspector) detects whether cray-pals is present.
  cray-pals:
    buildable: false
    externals:
      - spec: cray-pals@1.4.0
        modules: [cray-pals/1.4.0]
        prefix: /opt/cray/pe/pals/1.4.0
