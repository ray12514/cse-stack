modules:
  prefix_inspections:
    bin:
      - PATH
    lib:
      - LD_LIBRARY_PATH
    lib64:
      - LD_LIBRARY_PATH
    include:
      - CPATH
    lib/pkgconfig:
      - PKG_CONFIG_PATH
    lib64/pkgconfig:
      - PKG_CONFIG_PATH
    share/pkgconfig:
      - PKG_CONFIG_PATH
    share/man:
      - MANPATH
    .:
      - CMAKE_PREFIX_PATH

  default:
    enable:
      - lmod
    use_view: cse_modules
    roots:
      lmod: $SHARED_PATH/cse/$CSE_RELEASE/v2-cray-integrated/modules
    lmod:
      hierarchy: []
      hash_length: 0
      projections:
        all: 'cse/{name}'
      include:
        - cray-mpich
        - cray-libsci
        - cray-pals    # remove on Slurm Cray systems; keep on PBS Cray systems
      all:
        autoload: none
      hdf5:
        suffixes:
          '+mpi': 'mpi'
          '~mpi': 'serial'
      hdf5 +mpi:
        load:
          - cse/cray-mpich
      netcdf-c:
        suffixes:
          '+mpi': 'mpi'
          '~mpi': 'serial'
      netcdf-c +mpi:
        load:
          - cse/hdf5-mpi
      netcdf-c ~mpi:
        load:
          - cse/hdf5-serial
      netcdf-fortran:
        suffixes:
          '^netcdf-c +mpi': 'mpi'
          '^netcdf-c ~mpi': 'serial'
      netcdf-fortran ^netcdf-c +mpi:
        load:
          - cse/netcdf-c-mpi
      netcdf-fortran ^netcdf-c ~mpi:
        load:
          - cse/netcdf-c-serial
      netcdf-cxx4:
        suffixes:
          '^netcdf-c +mpi': 'mpi'
          '^netcdf-c ~mpi': 'serial'
      netcdf-cxx4 ^netcdf-c +mpi:
        load:
          - cse/netcdf-c-mpi
      netcdf-cxx4 ^netcdf-c ~mpi:
        load:
          - cse/netcdf-c-serial
      cray-mpich:
        autoload: none
      cray-libsci:
        autoload: none
      cray-pals:
        autoload: none
